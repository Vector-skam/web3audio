<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Audio Player</title>
    <style>
        body { 
            background: #121212; 
            color: #00ff88; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .player-card {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            text-align: center;
            max-width: 400px;
        }
        h1 { font-size: 1.2rem; margin-bottom: 20px; color: #aaa; }
        audio { width: 100%; margin-top: 10px; }
        .file-info { font-size: 10px; color: #555; margin-top: 15px; word-break: break-all; }
    </style>
</head>
<body>

    <div class="player-card">
        <h1>WEB3AUDIO PLAYER</h1>
        
        <audio id="audioPlayer" controls>
            <source src="https://raw.githubusercontent.com/Vector-skam/web3audio/main/audio/2-5343814226832036430_fEJCobup%20(online-audio-converter.com).mp3" type="audio/mpeg">
            Ваш браузер не поддерживает аудио.
        </audio>

        <div class="file-info" id="status">Статус: Готов к воспроизведению</div>
    </div>

    <script>
        const player = document.getElementById('audioPlayer');
        const status = document.getElementById('status');

        player.onerror = function() {
            status.style.color = "#ff4444";
            status.innerText = "Ошибка: Не удалось найти файл в репозитории.";
        };

        player.onplay = function() {
            status.style.color = "#00ff88";
            status.innerText = "Сейчас играет: 2-534381...fEJCobup.mp3";
        };
    </script>
</body>
</html>
