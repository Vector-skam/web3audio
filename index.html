<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Аудио Плеер с Волной</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    :root { --accent: #1ed760; }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .app {
      width: 100%;
      max-width: 440px;
      background: #111;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 70px rgba(0,0,0,0.8);
    }
    
    .now-playing {
      padding: 40px 30px 20px;
      text-align: center;
      background: #1a1a1a;
    }
    
    .cover {
      width: 240px;
      height: 240px;
      margin: 0 auto 25px;
      background: #222;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 90px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.7);
      transition: transform 0.4s;
    }
    
    .playing .cover { animation: spin 25s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    .track-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 6px; }
    .track-subtitle { color: #aaa; font-size: 0.95rem; }
    
    /* Визуализация волны */
    .visualizer {
      margin: 30px 0 20px;
      height: 80px;
      position: relative;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    .progress-area {
      margin: 15px 0 25px;
    }
    .progress {
      height: 5px;
      background: #333;
      border-radius: 999px;
      position: relative;
      cursor: pointer;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      border-radius: 999px;
    }
    .time {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #888;
      margin-top: 6px;
    }
    
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin: 15px 0 30px;
    }
    .controls button {
      background: none;
      border: none;
      color: #ddd;
      font-size: 2rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .controls button:hover { color: #fff; transform: scale(1.1); }
    .play-pause {
      width: 68px;
      height: 68px;
      background: var(--accent);
      color: #000;
      border-radius: 50%;
      font-size: 2.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .playlist-header {
      padding: 18px 25px 12px;
      font-size: 1.05rem;
      font-weight: 600;
      border-top: 1px solid #222;
    }
    .playlist {
      max-height: 300px;
      overflow-y: auto;
    }
    .track-item {
      padding: 13px 25px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .track-item:hover { background: #1f1f1f; }
    .track-item.playing { background: #1f1f1f; color: var(--accent); }
    .track-num { width: 28px; color: #777; font-weight: 500; }
    .track-name { flex: 1; font-size: 0.97rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div class="app">
    <div class="now-playing" id="nowPlaying">
      <div class="cover" id="cover">🎵</div>
      
      <div class="track-title" id="title">Выберите трек</div>
      <div class="track-subtitle" id="subtitle">Папка audio</div>
      
      <!-- Визуализация длины волны -->
      <div class="visualizer">
        <canvas id="canvas" width="400" height="80"></canvas>
      </div>
      
      <div class="progress-area">
        <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
        <div class="time">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
      
      <div class="controls">
        <button id="prev">⏮</button>
        <button id="playPause" class="play-pause">▶</button>
        <button id="next">⏭</button>
      </div>
    </div>
    
    <div class="playlist-header">Плейлист из папки audio</div>
    <div class="playlist">
      <ul id="playlist" style="list-style:none;"></ul>
    </div>
  </div>

  <audio id="audio"></audio>

  <script>
    const audio = document.getElementById('audio');
    const playlistEl = document.getElementById('playlist');
    const cover = document.getElementById('cover');
    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const playPauseBtn = document.getElementById('playPause');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const nowPlaying = document.getElementById('nowPlaying');

    // Canvas для визуализации
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let analyser, dataArray, source, audioContext;

    // === НАСТРОЙКИ ===
    const GITHUB_USER = 'DidukhMaksim';
    const GITHUB_REPO = 'https://github.com/Vector-skam/web3audio/new/main';   // ← замени обязательно
    const BRANCH = 'main';
    const FOLDER = 'audio';

    const baseURL = `https://raw.githubusercontent.com/\( {GITHUB_USER}/ \){GITHUB_REPO}/\( {BRANCH}/ \){FOLDER}/`;

    let tracks = [];
    let currentIndex = -1;
    let isPlaying = false;

    async function loadTracks() {
      try {
        playlistEl.innerHTML = '<li style="padding:25px;color:#666;text-align:center;">Загружаем треки...</li>';
        const res = await fetch(`https://api.github.com/repos/\( {GITHUB_USER}/ \){GITHUB_REPO}/contents/${FOLDER}`);
        if (!res.ok) throw new Error();
        const files = await res.json();

        tracks = files.filter(f => f.type === 'file' && /\.(mp3|wav|ogg|m4a|flac|aac|opus)$/i.test(f.name));

        playlistEl.innerHTML = '';
        if (tracks.length === 0) {
          playlistEl.innerHTML = '<li style="padding:25px;color:#888;text-align:center;">Нет аудиофайлов</li>';
          return;
        }

        tracks.forEach((track, i) => {
          const li = document.createElement('li');
          li.className = 'track-item';
          li.innerHTML = `<span class="track-num">\( {(i+1).toString().padStart(2,'0')}</span><span class="track-name"> \){track.name}</span>`;
          li.onclick = () => playTrack(i);
          playlistEl.appendChild(li);
        });

        if (tracks.length > 0) playTrack(0);
      } catch (e) {
        playlistEl.innerHTML = `<li style="padding:25px;color:#ff6666;text-align:center;">Ошибка загрузки плейлиста.<br>Репозиторий должен быть публичным.</li>`;
      }
    }

    function initAudioContext() {
      if (audioContext) return;
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 128; // для красивых столбиков
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      source = audioContext.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioContext.destination);
    }

    function drawVisualizer() {
      if (!analyser) return;
      analyser.getByteFrequencyData(dataArray);
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const barWidth = canvas.width / dataArray.length * 1.5;
      let x = 0;

      for (let i = 0; i < dataArray.length; i++) {
        const barHeight = (dataArray[i] / 255) * canvas.height * 0.9;
        
        const hue = i * 2 + 200; // зелёно-голубой оттенок
        ctx.fillStyle = `hsl(${hue}, 90%, 65%)`;
        ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
        
        x += barWidth + 1;
      }
      requestAnimationFrame(drawVisualizer);
    }

    function playTrack(index) {
      if (index < 0 || index >= tracks.length) return;
      currentIndex = index;
      const track = tracks[index];

      audio.src = baseURL + encodeURIComponent(track.name);
      initAudioContext();
      audio.play().catch(() => {});

      titleEl.textContent = track.name;
      subtitleEl.textContent = 'Из папки audio';
      cover.textContent = '🎵';

      document.querySelectorAll('.track-item').forEach((el, i) => {
        el.classList.toggle('playing', i === index);
      });

      nowPlaying.classList.add('playing');
      playPauseBtn.innerHTML = '❚❚';
      isPlaying = true;

      if (!audioContext || audioContext.state === 'suspended') audioContext.resume();
      drawVisualizer();
    }

    function togglePlay() {
      if (!audio.src) return;
      if (audio.paused) {
        audio.play();
        playPauseBtn.innerHTML = '❚❚';
        nowPlaying.classList.add('playing');
        isPlaying = true;
      } else {
        audio.pause();
        playPauseBtn.innerHTML = '▶';
        nowPlaying.classList.remove('playing');
        isPlaying = false;
      }
    }

    // Управление
    playPauseBtn.onclick = togglePlay;
    nextBtn.onclick = () => playTrack((currentIndex + 1) % tracks.length);
    prevBtn.onclick = () => playTrack((currentIndex - 1 + tracks.length) % tracks.length);

    // Прогресс
    audio.ontimeupdate = () => {
      if (!audio.duration) return;
      const percent = (audio.currentTime / audio.duration) * 100;
      progressBar.style.width = percent + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
      totalTimeEl.textContent = formatTime(audio.duration);
    };

    progress.onclick = (e) => {
      const rect = progress.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pos * audio.duration;
    };

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `\( {m}: \){s < 10 ? '0' : ''}${s}`;
    }

    audio.onended = () => playTrack((currentIndex + 1) % tracks.length);

    // Старт
    loadTracks();
  </script>
</body>
</html>
